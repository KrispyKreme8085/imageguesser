<!DOCTYPE html>
<html>
<head>
    <title>Zoom Video Classifier</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            overflow: hidden;
        }

        #start-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        #app {
            display: none;
            height: 100vh;
            width: 100vw;
        }

        /* FULL WIDTH RIGHT PANEL */
        #label-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 10px;
            gap: 10px;
        }

        .card {
            flex: 1;
            background: #1e293b;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .label {
            font-weight: 500;
        }

        .percent {
            font-weight: bold;
        }
    </style>
</head>

<body>

<div id="start-screen">
    <h1>Teachable Machine - Screen Capture</h1>
    <button onclick="init()">Start</button>
</div>

<div id="app">
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
const URL = "./tm-my-image-model/";

let model, video, labelContainer;

/* INIT */
async function init() {
    document.getElementById("start-screen").style.display = "none";
    document.getElementById("app").style.display = "flex";

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);

    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });

    // Hidden video (no DOM append)
    video = document.createElement("video");
    video.srcObject = stream;
    video.autoplay = true;

    labelContainer = document.getElementById("label-container");

    video.onloadeddata = () => loop();
}

/* LOOP */
async function loop() {
    await predict();
    requestAnimationFrame(loop);
}

/* FLIP ANIMATION STATE */
let lastOrder = [];

/* PREDICT */
async function predict() {
    const prediction = await model.predict(video);

    const top5 = prediction
        .sort((a, b) => b.probability - a.probability)
        .slice(0, 5);

    const newOrder = top5.map(p => p.className);

    // STORE POSITIONS BEFORE
    const firstRects = {};
    Array.from(labelContainer.children).forEach(child => {
        firstRects[child.dataset.key] = child.getBoundingClientRect();
    });

    labelContainer.innerHTML = "";

    top5.forEach(p => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.key = p.className;

        const label = document.createElement("div");
        label.className = "label";
        label.innerText = p.className;

        const percent = document.createElement("div");
        percent.className = "percent";
        percent.innerText = (p.probability * 100).toFixed(1) + "%";

        card.appendChild(label);
        card.appendChild(percent);
        labelContainer.appendChild(card);
    });

    // AFTER POSITIONS (FLIP animation)
    Array.from(labelContainer.children).forEach(child => {
        const key = child.dataset.key;
        if (!firstRects[key]) return;

        const last = child.getBoundingClientRect();
        const first = firstRects[key];

        const dx = first.left - last.left;
        const dy = first.top - last.top;

        child.style.transform = `translate(${dx}px, ${dy}px)`;

        requestAnimationFrame(() => {
            child.style.transform = "";
        });
    });

    lastOrder = newOrder;
}
</script>

</body>
</html>
